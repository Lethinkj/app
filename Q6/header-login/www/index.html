<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login UI</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #eef2f7;
        margin: 0;
        padding: 20px;
      }
      .card {
        max-width: 420px;
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
        padding: 18px;
        box-shadow: 0 12px 20px rgba(0, 0, 0, 0.08);
      }
      .header-img {
        width: 100%;
        height: 140px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 16px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        margin-bottom: 12px;
      }
      button {
        width: 100%;
        padding: 10px;
        border: none;
        background: #0f172a;
        color: #fff;
        border-radius: 8px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="header-img" src="img/header.svg" alt="Header" />
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="Enter email" />

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter password" />

      <button id="loginBtn">Login</button>
    </div>

    <script>
      document.getElementById("loginBtn").addEventListener("click", () => {
        alert("Login submitted");
      });
    </script>
  </body>
</html>
