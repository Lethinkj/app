<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6fb;
        margin: 0;
        padding: 24px;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        max-width: 420px;
        margin: 0 auto;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 16px 0;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        margin-bottom: 12px;
      }
      button {
        width: 100%;
        padding: 10px;
        border: none;
        background: #0f172a;
        color: #fff;
        border-radius: 8px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>User Login</h1>
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Enter username" />

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter password" />

      <button id="loginBtn">Login</button>
    </div>

    <script>
      document.getElementById("loginBtn").addEventListener("click", () => {
        const username = document.getElementById("username").value.trim();
        alert("Login clicked for: " + (username || "(empty)") + ".");
      });
    </script>
  </body>
</html>
