<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Submit and Reset</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f7f7f7;
        margin: 0;
        padding: 24px;
      }
      .container {
        max-width: 500px;
        margin: 0 auto;
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 10px 18px rgba(0, 0, 0, 0.07);
      }
      .row {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
      }
      button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
      }
      .submit {
        background: #1f2937;
        color: #fff;
      }
      .reset {
        background: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Simple Form</h2>
      <input id="name" type="text" placeholder="Enter name" />
      <div class="row">
        <button class="submit" id="submitBtn">Submit</button>
        <button class="reset" id="resetBtn">Reset</button>
      </div>
      <p id="output"></p>
    </div>

    <script>
      const nameInput = document.getElementById("name");
      const output = document.getElementById("output");

      document.getElementById("submitBtn").addEventListener("click", () => {
        output.textContent = "Submitted: " + (nameInput.value || "(empty)");
      });

      document.getElementById("resetBtn").addEventListener("click", () => {
        nameInput.value = "";
        output.textContent = "";
      });
    </script>
  </body>
</html>
